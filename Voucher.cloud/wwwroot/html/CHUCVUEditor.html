<style>

    #desk______controlid_____ .form-container {
        width: 500px;
        height: 350px;
        margin: auto;
    }
</style>

<!--Nội dung màn hình thêm/sửa-->
<div class='form-group'>
    <div class='modal-label-200' data-i18n-layout='layout1' data-i18n-key='Common_Var_Code'>

    </div>
    <input type='text' class='modal-textbox Code' validate='true' />
</div>
<div class='form-group'>
    <div class='modal-label-200' data-i18n-layout='layout1' data-i18n-key='Common_Var_Name'>

    </div>
    <input type='text' class='modal-textbox Name' validate='true' />
</div>
<div class='form-group'>
    <div class='modal-label-200' data-i18n-layout='layout1' data-i18n-key='Hoa_hong_ca_nhan1'>

    </div>
    <input type="text" class="modal-textbox text-decimal HHCaNhan" validate="true" allownegative="false"  style="width:120px"/>
</div>

<div class='form-group'>
    <div class='modal-label-200' data-i18n-layout='layout1' data-i18n-key='Hoa_hong_truong_cua_hang1'>

    </div>

    <input type="text" class="modal-textbox text-decimal HHTruongCuaHang" validate="true" allownegative="false" style="width:120px" />
</div>

<div class='form-group'>
    <div class='modal-label-200' data-i18n-layout='layout1' data-i18n-key='Hoa_hong_pho_cua_hang1'>

    </div>

    <input type="text" class="modal-textbox text-decimal HHPhoCuaHang" validate="true" allownegative="false" style="width:120px" />
</div>

<div class='form-group'>
    <div class='modal-label-200' data-i18n-layout='layout1' data-i18n-key='Quy_doi_pha_che1'>

    </div>

    <input type="text" class="modal-textbox text-decimal QuyDoiPhaChe" validate="true" allownegative="false" style="width:120px" />
</div>
<div class='form-group'>
    <div class='modal-label-200' data-i18n-layout='layout1' data-i18n-key='Quy_chung1'>

    </div>

    <input type="text" class="modal-textbox text-decimal QuyChung" validate="true" allownegative="false" style="width:120px" />
</div>
<div class='form-group'>
    <div class='modal-label-200' data-i18n-layout='layout1' data-i18n-key='Common_Var_Other'>
    </div>
    <input type='text' class='modal-textbox Note' />
</div>

<script>

    $(function () {
        $("#desk______controlid_____ .billingual-wrapper").click(function () {
            var forElement = $(this).attr('for');
            if (forElement) {
                $("#desk______controlid_____ ." + forElement).click();
            }
        });
    })
    var _____controlid______NewChecked = false;
    var _____controlid______CurrentRowIndex = '';
    var _____controlid______Table = 'CHUCVU';
    var _____controlid______TableColumnCode = 'Name';

    async function _____controlid______Init(screenInfo, fromOther) {
        await _____controlid______InitControl(screenInfo);
        if (fromOther) {
            await translator.translateWithKey($('#desk______controlid_____ .form-title .billingual-wrapper')[0], 'CHUCVU_Var_Add');
            await translator.translateWithKey($('#tab______controlid_____ .billingual-wrapper')[0], 'CHUCVU_Var_Add');
        }
    }

    async function _____controlid______OnShow(screenInfo) {
        await _____controlid______Init(screenInfo, false);

        let ClusterizeData = _____parentid______S3Table.ClusterizeData;
        var index = ClusterizeData.data.findIndex(function (o) {
            return o.Id === ClusterizeData.current_row_id;
        })
        _____controlid______CurrentRowIndex = index;

        if (_____controlid______CurrentRowIndex != -1) {
            $('#desk______controlid_____ .Code').value(ClusterizeData.data[index].Code);
            $('#desk______controlid_____ .Name').value(ClusterizeData.data[index].Name);
            $('#desk______controlid_____ .HHCaNhan').value(ClusterizeData.data[index].HHCaNhan);
            $('#desk______controlid_____ .HHTruongCuaHang').value(ClusterizeData.data[index].HHTruongCuaHang);
            $('#desk______controlid_____ .HHPhoCuaHang').value(ClusterizeData.data[index].HHPhoCuaHang);
            $('#desk______controlid_____ .QuyDoiPhaChe').value(ClusterizeData.data[index].QuyDoiPhaChe);
            $('#desk______controlid_____ .QuyChung').value(ClusterizeData.data[index].QuyChung);
            $('#desk______controlid_____ .Note').value(ClusterizeData.data[index].Note);
        }

        $('#desk______controlid_____ .Code').focus().select();
    }


    async function _____controlid______OnShowFromOther(screenInfo) {
        await _____controlid______Init(screenInfo, true);

        $('#desk______controlid_____ .Code').focus().select();
    }

    async function _____controlid______OnAdd() {
        $('#desk______controlid_____ .Code').value('');
        $('#desk______controlid_____ .Code').focus().select();
        $('#desk______controlid_____ .Name').value("");
        $('#desk______controlid_____ .HHCaNhan').value(0);
        $('#desk______controlid_____ .HHTruongCuaHang').value(0);
        $('#desk______controlid_____ .HHPhoCuaHang').value(0);
        $('#desk______controlid_____ .QuyDoiPhaChe').value(0);
        $('#desk______controlid_____ .QuyChung').value(0);
        $('#desk______controlid_____ .Note').value("");
    }

    async function _____controlid______OnSave() {
        _____controlid______Loading.show();

        let ClusterizeData = typeof _____parentid______S3Table !== 'undefined' && _____parentid______S3Table ? _____parentid______S3Table.ClusterizeData : null;
        var row = new Object();
        row.Id = _____controlid______CurrentRowIndex == -1 ? '' : ClusterizeData.data[_____controlid______CurrentRowIndex].Id;
        row.Code = $('#desk______controlid_____ .Code').value();
        row.Name = $('#desk______controlid_____ .Name').value();
        row.HHCaNhan = $('#desk______controlid_____ .HHCaNhan').value() || 0;
        row.HHTruongCuaHang = $('#desk______controlid_____ .HHTruongCuaHang').value() || 0;
        row.HHPhoCuaHang = $('#desk______controlid_____ .HHPhoCuaHang').value() || 0;
        row.QuyDoiPhaChe = $('#desk______controlid_____ .QuyDoiPhaChe').value() || 0;
        row.QuyChung = $('#desk______controlid_____ .QuyChung').value() || 0;
        row.QuyChung = $('#desk______controlid_____ .QuyChung').value() || 0;
        row.Note = $('#desk______controlid_____ .Note').value();
        row.ModifiedAt = _____controlid______CurrentRowIndex == -1 ? null : ClusterizeData.data[_____controlid______CurrentRowIndex].ModifiedAt;
        row.ModifiedBy = ApplicationInstance.UserId;
        row.RowState = _____controlid______NewChecked == true ? 1 : 2;      // 1: add, 2: edit
        return _____controlid______CallSaveApi(row);
    }

    function _____controlid______CallSaveApi(row) {
        return new Promise(function (resolve, reject) {
            $.ajax
                ({
                    type: 'POST',
                    url: 'api/' + _____controlid______Table + '/Save',
                    headers: {
                        '3t-action-table': _____controlid______Table,
                        '3t-action-menu-type': 'I',
                        '3t-action-type': row.RowState == 1 ? 'CREATE' : 'UPDATE'
                    },
                    //async: false,
                    data: JSON.stringify(row),
                    contentType: 'application/json; charset=utf-8',
                    success: function (data) {
                        let obj = data;
                        if (obj.Code == 1) {
                            ShowNotification('Thành công!', 'success');
                            row.Id = obj.Id;
                            row.ModifiedAt = obj.ModifiedAt;
                            if (_____controlid______NewChecked == true) {
                                if (typeof _____parentid______S3Table !== 'undefined') {
                                    _____parentid______S3Table.Add(row);
                                }
                            } else {
                                _____parentid______S3Table.Update(row);
                            }

                            _____controlid______Loading.hide();
                            resolve(0);
                        } else {
                            _____controlid______Loading.hide();
                            handleResponseApiCode(_____controlid______AlertMessage, obj);
                            resolve(-1);
                        }
                    },

                    error: function (result) {
                        _____controlid______Loading.hide();
                        handleResponseError(_____controlid______AlertMessage, result);
                        resolve(-1);
                    }
                });
        });
    }
</script>
