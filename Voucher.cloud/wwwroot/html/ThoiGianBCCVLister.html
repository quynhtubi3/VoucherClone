<script>
    $(function () {

        $('#desk______controlid_____ .popup-modal-background>div[child-form="search"] .button-save').on('click', function () {
            $('#desk______controlid_____ .form-container:first').focus();
            $('#desk______controlid_____ .popup-modal-background').hide();            
            _____controlid______OnLoad();
        })

        $('#desk______controlid_____ .popup-modal-background').on('keydown', function (e) {
            if (e.ctrlKey && e.keyCode == 13 && _____controlid______Modal == 'search') {
                e.preventDefault();
                $('#desk______controlid_____ .form-container:first').focus();
                $('#desk______controlid_____ .popup-modal-background').hide();                
                _____controlid______OnLoad();
            }
        })

        if ($('#desk______controlid_____ .form-toolbar .button-export-excel2').length == 0) {

            $('#desk______controlid_____ .form-toolbar .button-quick-search').after("<div class='s3t-tooltip toolbar-button button-export-excel2' data-tooltip-value='Kết xuất'><i class='fa fa-file-excel-o'></i></div>");            
            buildToolTip2($('.button-export-excel2'));
        }

        $('#desk______controlid_____ .form-toolbar .button-export-excel2').on('click', function (e) {

            _____controlid______Export();

        });

    })

    function _____controlid______SearchPreprocess() {
        if ($('#desk______controlid_____ .popup-modal-background .TuNgay').value() == null) {
            let tempMonth = (new Date()).getMonth() - 1;
            let tempYear = (new Date()).getFullYear();

            if (tempMonth < 0) {//Thang bat dau tu 0
                tempMonth = 11;
                tempYear = tempYear - 1;
            }


            $('#desk______controlid_____ .popup-modal-background .TuNgay').value(new Date(tempYear, tempMonth, 1));
        }
        if ($('#desk______controlid_____ .popup-modal-background .DenNgay').value() == null) {
            //$('#desk______controlid_____ .popup-modal-background .DenNgay').value(new Date());
            $('#desk______controlid_____ .popup-modal-background .DenNgay').value(new Date(2050, 12, 31));
        }
    }

    _____controlid______Table = "ThoiGianBCCV";
    var _____controlid______TableColumnCode = 'NguoiGui';

    async function _____controlid______OnLoad() {

        _____controlid______SearchPreprocess();

        let toolbar = new Object();
        toolbar.Search = false;
        toolbar.Refresh = true;
        toolbar.Add = true;
        toolbar.Edit = true;
        toolbar.Delete = true;
        toolbar.Excel = true;
        toolbar.Import = true;
        toolbar.QuickSearch = true;
        _____controlid______DisableToolBar(toolbar);

        let model = new Object();

        //let TrangThai = $('#desk______controlid_____ .popup-modal-background .TrangThai').value();
        let NguoiDung = '';
        let NguoiDuyet = '';

        NguoiDung = $('#desk______controlid_____ .popup-modal-background .NVName').data('data-value') ? JSON.parse($('#desk______controlid_____ .popup-modal-background .NVName').data('data-value')).Id : '';
        NguoiDuyet = $('#desk______controlid_____ .popup-modal-background .Name').data('data-value') ? JSON.parse($('#desk______controlid_____ .popup-modal-background .Name').data('data-value')).Id : '';

        model.NguoiDung = NguoiDung;
        model.NguoiDuyet = NguoiDuyet;
        model.TuNgay = $('#desk______controlid_____ .popup-modal-background .TuNgay').value();
        model.DenNgay = $('#desk______controlid_____ .popup-modal-background .DenNgay').value();
        //model.TrangThai = TrangThai;        
        model.TrangThai = '';
        model.DUAN_Id = $('#desk______controlid_____ .DAName').data('data-value') ? JSON.parse($('#desk______controlid_____ .DAName').data('data-value')).Id : '';//20230908

        _____controlid______S3Table.Init();

        _____controlid______Loading.show();
        
        $.ajax({
            type: 'POST',
            url: 'api/BCCONGVIEC/GetListThoiGianBCCV',
            //async: false,
            data: JSON.stringify(model),
            contentType: 'application/json; charset=utf-8',
            success: function (data) {
                _____controlid______S3Table.Load(data);
                _____controlid______Loading.hide();
            },

            error: function (result) {
                _____controlid______Loading.hide();
                handleResponseError(_____controlid______AlertMessage, result, "_____controlid_____");
            }
        });

    }

    function _____controlid______Export() {

        let model = new Object();

        //let TrangThai = $('#desk______controlid_____ .popup-modal-background .TrangThai').value();
        let NguoiDung = '';
        let NguoiDuyet = '';

        NguoiDung = $('#desk______controlid_____ .popup-modal-background .NVName').data('data-value') ? JSON.parse($('#desk______controlid_____ .popup-modal-background .NVName').data('data-value')).Id : '';
        NguoiDuyet = $('#desk______controlid_____ .popup-modal-background .Name').data('data-value') ? JSON.parse($('#desk______controlid_____ .popup-modal-background .Name').data('data-value')).Id : '';

        model.NguoiDung = NguoiDung;
        model.NguoiDuyet = NguoiDuyet;
        model.TuNgay = $('#desk______controlid_____ .popup-modal-background .TuNgay').value();
        model.DenNgay = $('#desk______controlid_____ .popup-modal-background .DenNgay').value();
        //model.TrangThai = TrangThai;
        model.TrangThai = 'DAPHEDUYET';
        model.DUAN_Id = $('#desk______controlid_____ .DAName').data('data-value') ? JSON.parse($('#desk______controlid_____ .DAName').data('data-value')).Id : '';//20230908

        $.ajax({
            type: 'POST',
            url: 'api/BCCONGVIEC/ExportThoiGianBCCV',
            dataType: "json",
            contentType: 'application/json; charset=utf-8',
            data: JSON.stringify(model),
            complete: function () {

            },
            success: function (response) {

                if (response.Success === true) {

                    var binaryData = atob(response.Data);
                    const blob = new Blob([new Uint8Array(binaryData.length).map((_, index) => binaryData.charCodeAt(index))], {
                        type: 'application/vnd.ms-excel'
                    });

                    // Create a URL for the blob
                    var url = window.URL.createObjectURL(blob);

                    // Create a link element to trigger the download
                    var a = document.createElement('a');
                    a.href = url;
                    a.download = 'ThoiGianBCCV.xls'; // Set the desired file name
                    a.click();

                    // Revoke the object URL to free up resources
                    window.URL.revokeObjectURL(url);

                } else {

                    alert(response.Message);

                }
            },
            error: function (result) {

            }
        });

        //let a = document.createElement('a');
        //a.href = 'api/BCDUAN/Export?TuNgay=' + extra.TuNgay + '&DenNgay=' + extra.DenNgay + '&ScreenTransitionName=' + ScreenTransitionName;
        //a.click();
        //a.remove();

    }


</script>
