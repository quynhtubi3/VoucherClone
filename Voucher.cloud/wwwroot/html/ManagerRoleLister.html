    #desk______controlid_____ table input[type=checkbox] {
        margin: -1.5px 0px !important;

    #desk______controlid_____ .pagination-container {
        margin: 0px 0;
        display: flex;
        justify-content: space-between;
        align-items: center;
        background-color: var(--breaker-bay);
        height: 40px;
        padding: 10px;
    }

    #desk______controlid_____ .pagination {
        display: flex;
        list-style: none;
        padding: 0;
    }

        #desk______controlid_____ .pagination li {
            margin: 0 1px;
        }

        #desk______controlid_____ .pagination button {
            border: 1px solid #ddd;
            padding: 5px 10px;
            background: #fff;
            background: #fff;
            cursor: pointer;
            border-radius: 2px;
        }

            #desk______controlid_____ .pagination button.active {
                background: var(--breaker-bay);
                color: #fff;
            }

            #desk______controlid_____ .pagination button:disabled {
                opacity: 0.8;
                cursor: not-allowed;
            }

<div id="_____controlid______ScrollArea" class="clusterize-scroll" tabindex="0">
    <table controlid="_____controlid_____" htmlid='_____htmlid_____'>
        <colgroup>
            <col width='40' noresizeable />
            <col width='200' />
            <col width='200' />
            <col width='200' />
        </colgroup>
        <thead>
            <tr>
                <td></td>

                <th colname="Name" data-i18n-layout="layout2" data-i18n-key="Common_Var_Code"></th>
                <th colname="Description" data-i18n-layout="layout2" data-i18n-key="RoleList_Var_Name"></th>
                <th colname="Tyle" data-i18n-layout="layout2" data-i18n-key="RoleList_Var_Admin"></th>
            </tr>
        </thead>
        <tbody id="_____controlid______ContentArea" class="clusterize-content">
        </tbody>
    </table>

        <ul class="pagination" id="_____controlid______pagination"></ul>
        <div>
            <span data-i18n-layout='layout3' data-i18n-key='Common_Var_Display'></span>
            <select id="_____controlid______pageSizeSelect">
                <option value="10">10</option>
                <option value="20">20</option>
                <option value="50">50</option>
                <option value="100">100</option>
            </select>
            <span data-i18n-layout='layout3' data-i18n-key='Common_Var_Display_Panigation'></span>
        </div>
    </div>-->
</div>
<script>
    let _____controlid______currentPage = 1;
    let _____controlid______pageSize = 10;
    let _____controlid______totalPage = 1;
    $(function () {
        $('#desk______controlid_____ .s3tcloud-prefix.form-container:first').on('keyup', function (e) {
            switch (e.keyCode) {
                case 33: //PageUp
                    e.preventDefault();
                    _____controlid______GetPermision();
                    break;
                case 34: //PageDown
                    e.preventDefault();
                    _____controlid______GetPermision();
                    break;
                case 38: //Up                    
                    _____controlid______GetPermision();
                    break;
                case 40: //Down                        
                    _____controlid______GetPermision();
                    break;
            }
        });
        $('#desk______controlid_____ .s3tcloud-prefix.form-container .form-toolbar .button-export-excel').remove();
        $('#_____controlid______pageSizeSelect').on('change', function () {
            _____controlid______pageSize = parseInt($(this).val());
            _____controlid______currentPage = 1;
            _____controlid______OnLoad();
        });
        _____controlid______renderPagination();
        $('#desk______controlid_____ .form-toolbar .button-refresh').on('click', function (e) {
            _____controlid______OnLoad();
        });
    })

    function _____controlid______renderPagination() {
        const pagination = document.getElementById("_____controlid______pagination");
        pagination.innerHTML = "";
        pagination.innerHTML += `<li><button onclick="_____controlid______goToPage(1)" ${_____controlid______currentPage === 1 ? "disabled" : ""}>«</button></li>`;
        pagination.innerHTML += `<li><button onclick="_____controlid______goToPage(${_____controlid______currentPage - 1})" ${_____controlid______currentPage === 1 ? "disabled" : ""}>‹</button></li>`;
        let start = Math.max(1, _____controlid______currentPage - 2);
        let end = Math.min(_____controlid______totalPage, _____controlid______currentPage + 2);
        for (let i = start; i <= end; i++) {
            pagination.innerHTML += `<li><button onclick="_____controlid______goToPage(${i})" class="${i === _____controlid______currentPage ? "active" : ""}">${i}</button></li>`;
        }
        pagination.innerHTML += `<li><button onclick="_____controlid______goToPage(${_____controlid______currentPage + 1})" ${_____controlid______currentPage === _____controlid______totalPage ? "disabled" : ""}>›</button></li>`;
        pagination.innerHTML += `<li><button onclick="_____controlid______goToPage(${_____controlid______totalPage})" ${_____controlid______currentPage === _____controlid______totalPage ? "disabled" : ""}>»</button></li>`;
    }
    function _____controlid______goToPage(page) {
        if (page < 1 || page > _____controlid______totalPage) return;
        _____controlid______currentPage = page;
        _____controlid______renderPagination();
        _____controlid______OnLoad();
    }

    function _____controlid______GetPermision() {
        if (_____controlid______S3Table.ClusterizeData.CurrentRowData().NotDelete == true) {
            _____controlid______Right1 = false;
            _____controlid______Right2 = false;
            _____controlid______Right3 = false;
            $('#desk______controlid_____ .button-edit').removeClass("toolbar-button").addClass("toolbar-button-disabled");
            $('#desk______controlid_____ .button-delete').removeClass("toolbar-button").addClass("toolbar-button-disabled");
            $('#desk______controlid_____ .button-right').removeClass("toolbar-button").addClass("toolbar-button-disabled");
        } else {
            _____controlid______Right1 = true;
            _____controlid______Right2 = true;
            _____controlid______Right3 = true;
            $('#desk______controlid_____ .button-edit').removeClass("toolbar-button-disabled").addClass("toolbar-button");
            $('#desk______controlid_____ .button-delete').removeClass("toolbar-button-disabled").addClass("toolbar-button");
            $('#desk______controlid_____ .button-right').removeClass("toolbar-button-disabled").addClass("toolbar-button");
        }
    }

    _____controlid______Type = "ROLE";
    async function _____controlid______OnLoad() {
        _____controlid______S3Table.SetOptions({
            SortCondition: sort_by({ name: 'Name', reverse: false }),
            DetailCallback: _____controlid______GetPermision
        })

        $("#container______controlid_____ .form-toolbar .button-role").remove();
        $("#container______controlid_____ .form-toolbar .button-right").attr('data-tooltip-key','GroupRightAssignment_Title');
        await translator.translateWithKey($('#desk______controlid_____ .billingual-wrapper')[0], "RoleList_Var_Title");
        await translator.translateWithKey($('#tab______controlid_____ .billingual-wrapper')[0], "RoleList_Var_Title");
        let model = new Object();
        model.PageNumber = _____controlid______currentPage;
        model.PageSize = _____controlid______pageSize;



        _____controlid______Loading.show();
        window.setTimeout(function () {
            $.ajax({
                type: 'POST',
                url: 'api/Admin/RolesPagination',
                //async: false,
                data: JSON.stringify(model),
                contentType: 'application/json; charset=utf-8',
                success: function (data) {
                    _____controlid______S3Table.Load(data.Data);
                    _____controlid______totalPage = Math.ceil(data.TotalCount / _____controlid______pageSize);
                    _____controlid______renderPagination();
                },

                error: function (result) {
                    _____controlid______Loading.hide();
                    handleResponseError(_____controlid______AlertMessage, result);
                },
                complete: function () {
                    _____controlid______Loading.hide();
                },
            });
        }, 0);           
    }

    function _____controlid______OnDelete() {
        _____controlid______AlertMessage.showConfirm(_____controlid______Delete);
    }

    function _____controlid______Delete() {
        var id = _____controlid______S3Table.ClusterizeData.current_row_id;
        let index = _____controlid______S3Table.ClusterizeData.data.findIndex(function (o) {
            return o.Id === id;
        });
        if (_____controlid______S3Table.ClusterizeData.data[index].NotDelete == true) {
            window.setTimeout(function () {
                _____controlid______AlertMessage.showInfo('Common_Msg_NoPrivilege');
            }, 100);            
            return;
        }
        $.ajax
            ({
                type: 'DELETE',
                url: 'api/Admin/DeleteRole?id=' + id,
                async: false,
                contentType: 'application/json; charset =utf-8',
                success: function (data) {
                    if (data) {
                        ShowNotification('Thành công!', 'success');
                        _____controlid______S3Table.Delete(id);
                    }
                },

                error: function (result) {
                    handleResponseError(_____controlid______AlertMessage, result);
                }
            });
    }
</script>
