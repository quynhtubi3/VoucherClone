<script>
    $( function () {
        $('#desk______controlid_____ .s3tcloud-prefix.form-container > .form-footer .button-add').remove();
        BindDataType_Voucher();
        BindDataSeller();
        $('#desk______controlid_____ .SellerId').off('change').on('change', function () {
            let selected = $(this).find('option:selected');
            $('#desk______controlid_____ .ChucVu').value(selected.data('chucvu'));
            $('#desk______controlid_____ .IndividualCommission').value(selected.data('hhcanhan'));

        });

        $(document).on("change", "#desk______controlid_____ .Status", function () {
            var value = $('#desk______controlid_____ .Status').value();
            if (value == 3 || value == '3') {
                $('#desk______controlid_____ .button-Addition-NumberOfUseRemaining').show();
                $('#desk______controlid_____ .button-Subtraction-NumberOfUseRemaining').show();
                $('#desk______controlid_____ .button-Addition-NumberOfFreeRemaining').show();
                $('#desk______controlid_____ .button-Subtraction-NumberOfFreeRemaining').show();
            }         
        });
        $(document)
            .off("click", "#desk______controlid_____ .button-Subtraction-NumberOfUseRemaining")
            .on("click", "#desk______controlid_____ .button-Subtraction-NumberOfUseRemaining", function () {
                let $input = $('#desk______controlid_____ .NumberOfUseRemaining');
                let curValue = parseInt($input.value() || 0);
                if (curValue > 0) {
                    $input.val(curValue - 1);
                }
            });

        $(document)
            .off("click", "#desk______controlid_____ .button-Addition-NumberOfUseRemaining")
            .on("click", "#desk______controlid_____ .button-Addition-NumberOfUseRemaining", function () {
                let $input = $('#desk______controlid_____ .NumberOfUseRemaining');
                let curValue = parseInt($('#desk______controlid_____ .NumberOfUseRemaining').value() || 0);
                if (curValue < _____controlid______voucherData.NumberOfUse) {
                    $input.val(curValue + 1);
                } else {
                    ShowNotification(`Voucher ${_____controlid______voucherData.Serial} có ${_____controlid______voucherData.NumberOfUse} lần sử dụng. Bạn đã tăng quá giới hạn sử dụng của voucher`, 'error');
                }
            });

        $(document)
            .off("click", "#desk______controlid_____ .button-Subtraction-NumberOfFreeRemaining")
            .on("click", "#desk______controlid_____ .button-Subtraction-NumberOfFreeRemaining", function () {
                let $input = $('#desk______controlid_____ .NumberOfFreeRemaining');
                let curValue = parseInt($input.value() || 0);
                if (curValue > 0) {
                    $input.val(curValue - 1);
                }
            });

        $(document)
            .off("click", "#desk______controlid_____ .button-Addition-NumberOfFreeRemaining")
            .on("click", "#desk______controlid_____ .button-Addition-NumberOfFreeRemaining", function () {
                let $input = $('#desk______controlid_____ .NumberOfFreeRemaining');
                let curValue = parseInt($('#desk______controlid_____ .NumberOfFreeRemaining').value() || 0);
                if (curValue < _____controlid______voucherData.NumberOfFree) {
                    $input.val(curValue + 1);
                } else {

                    ShowNotification(`Voucher ${_____controlid______voucherData.Serial} có ${_____controlid______voucherData.NumberOfFree} lần sử dụng miễn phí. Bạn đã tăng quá giới hạn sử dụng của voucher`, 'error');
                }
            });
        $("#desk______controlid_____ .BuyerName").on("input", function () {
            let value = $("#desk______controlid_____ .BuyerName").value();
            if (isNullOrEmpty(value)) {
                $('#desk______controlid_____ .Status').value(1);

        $("#desk______controlid_____ .ApplicableLocation").on("input", function () {

                _____controlid______choseCS = true;
            } else {
                _____controlid______choseCS = false;
            }
        });

    });
    var _____controlid______Table = 'Voucher';

    var _____controlid______TableColumnCode = 'Serial';

    var _____controlid_____KhachHangSearhItemSelect;
    var _____controlid______IsFromOther = false;
    var _____controlid______DataSourceOther;
    var _____controlid______choseKH = true;
    var _____controlid______choseCS = true;


    function _____controlid_____KhachHangSearhSelect(item, element) {

    }
    

    async function _____controlid______GetUserDetail(row) {
        $.ajax({
            type: 'POST',
            url: 'api/UserProfile/Get_Detail',
            async: false,
            data: JSON.stringify(row),
            contentType: 'application/json; charset=utf-8',
            success: function (data) {
                _____controlid______UserDetail = data;
            },

            error: function (result) {

            }
        });
    }

    function BindDataType_Voucher() {
        $('#desk______controlid_____ .Type_Voucher').empty();
        let model = new Object();
        model.Name = '';
        model.Code = '';
        model.Type = 0;
        model.DefaultValidityPeriod = 0;
        model.DefaultPrice = 0;
        model.DefaultRealPrice = 0;
        model.DefaultNumberOfUse = 0;
        model.DefaultNumberOfFree = 0;
        model.PageNumber = 1;
        model.PageSize = 99999;
        $.ajax({
            type: 'POST',
            url: '/api/VoucherType/Get',
            async: false,
            data: JSON.stringify(model),
            contentType: 'application/json; charset=utf-8',
            complete: function () {

            },
            success: function (res) {
                var response = res.Data;
                $('#desk______controlid_____ .Type_Voucher').empty();
                //$('#desk______controlid_____ .Type_Voucher').append('<option value="">-- Chọn loại voucher --</option>');
                for (var j = 0; j < response.length; j++) {
                    row = '<option value="' + response[j].Id + '"'
                        + ' data-defaultprice="' + response[j].DefaultPrice + '"'
                        + ' data-defaultvalidity="' + response[j].DefaultValidityPeriod + '"'
                        + ' data-defaultnumberofuse="' + response[j].DefaultNumberOfUse + '"'
                        + ' data-defaultnumberoffree="' + response[j].DefaultNumberOfFree + '"'
                        + ' data-type="' + response[j].Type + '">'
                        +  response[j].Code + '-' + response[j].Name
                        + '</option>';

                    $('#desk______controlid_____ .Type_Voucher').append(row);
                }
                $('#desk______controlid_____ .Type_Voucher')[0].selectedIndex = 0;

            },
            error: function (result) {

            }
        });
    }



    function BindDataSeller() {
        $('#desk______controlid_____ .SellerId').empty();
        let model = new Object();
        model.Name = '';
        model.DienThoai = '';
        $.ajax({
            type: 'POST',
            url: '/api/DMNGUOIBAN/Get',
            async: false,
            data: JSON.stringify(model),
            contentType: 'application/json; charset=utf-8',
            complete: function () {

            },
            success: function (response) {
                $('#desk______controlid_____ .SellerId').empty();
                $('#desk______controlid_____ .SellerId').append('<option value="">-- Chọn người bán --</option>');

                    row = '<option value="' + response[j].Id + '"'
                        + ' data-HHCaNhan="' + response[j].HHCaNhan + '"'
                        + ' data-name="' + response[j].Name + '"'
                        + ' data-chucvu="' + response[j].ChucVu + '"'
                        + ' data-HHTruongCuaHang="' + response[j].HHTruongCuaHang + '"'
                        + ' data-HHPhoCuaHang="' + response[j].HHPhoCuaHang + '"'
                        + ' data-QuyDoiPhaChe="' + response[j].QuyDoiPhaChe + '"'
                        + ' data-QuyChung="' + response[j].QuyChung + '">'
                        + response[j].Name + ' -- ' + response[j].DienThoai
                        + '</option>';

                    $('#desk______controlid_____ .SellerId').append(row);
                }
                $('#desk______controlid_____ .SellerId')[0].selectedIndex = 0;

            },
            error: function (result) {

            }
        });
    }

    $('#desk______controlid_____ .Type_Voucher').on('change', function () {
        const selected = $(this).find('option:selected');
        const defaultPrice = selected.data('defaultprice');
        const defaultValidity = selected.data('defaultvalidity');
        const type = selected.data('type');
        const defaultnumberofuse = selected.data('defaultnumberofuse');
        const defaultnumberoffree = selected.data('defaultnumberoffree');
        if (!isNullOrEmpty(defaultPrice)) {
            $('#desk______controlid_____ .SalePrice').value(defaultPrice);
        } else {
            $('#desk______controlid_____ .SalePrice').value(0);
        }

        if (!isNullOrEmpty(defaultValidity)) {
            $('#desk______controlid_____ .ValidityPeriod').value(defaultValidity);
        } else {
            $('#desk______controlid_____ .ValidityPeriod').value(0);
        }

        if (!isNullOrEmpty(type)) {
            $('#desk______controlid_____ .VoucherType').value(type);
        } else {
            $('#desk______controlid_____ .VoucherType').value(0);
        }

        if (!isNullOrEmpty(defaultnumberofuse)) {
            $('#desk______controlid_____ .NumberOfUseRemaining').value(defaultnumberofuse);
            _____controlid______voucherData.NumberOfUse = defaultnumberofuse;

        } else {
            $('#desk______controlid_____ .NumberOfUseRemaining').value(0);
        }
        if (!isNullOrEmpty(defaultnumberoffree)) {
            _____controlid______voucherData.NumberOfFree = defaultnumberoffree;
            $('#desk______controlid_____ .NumberOfFreeRemaining').value(defaultnumberoffree);
        } else {
            $('#desk______controlid_____ .NumberOfFreeRemaining').value(0);
        }


        var activationDateStr = $('#desk______controlid_____ .ActivationDate').value();
        if (!isNullOrEmpty(defaultValidity) && !isNullOrEmpty(activationDateStr)) {
            _____controlid______CalExpiryDate();
        }
    });

    $('#desk______controlid_____ .ValidityPeriod').on('change', function () {
        var activationDateStr = $('#desk______controlid_____ .ActivationDate').value();
        var defaultValidity = $('#desk______controlid_____ .ValidityPeriod').value();
        if (!isNullOrEmpty(defaultValidity) && !isNullOrEmpty(activationDateStr)) {
            _____controlid______CalExpiryDate();
        }

    });
    $('#desk______controlid_____ .ActivationDate').on('blur', function () {
        _____controlid______CalExpiryDate();
    });
    function _____controlid______CalExpiryDate() {
        var activationDateStr = $('#desk______controlid_____ .ActivationDate').value();
        var validityId = $('#desk______controlid_____ .ValidityPeriod').value();
        // Ánh xạ số tháng từ ID
        var monthMap = {
            "1": 3,
            "2": 6,
            "3": 9,
            "4": 12
        };

        var monthsToAdd = monthMap[validityId];
        if (!monthsToAdd) return;

        // Parse chuỗi yyyy/MM/dd thành Date object
        var dateParts = activationDateStr.split(' ')[0].split('/'); // "2025/03/12" → ["2025", "03", "12"]
        if (dateParts.length !== 3) return;

        var year = parseInt(dateParts[0], 10);
        var month = parseInt(dateParts[1], 10) - 1; // JS month: 0-indexed
        var day = parseInt(dateParts[2], 10);

        var activationDate = new Date(year, month, day);
        if (isNaN(activationDate)) return;

        // Cộng thêm tháng
        var expiryDate = new Date(activationDate);
        expiryDate.setMonth(expiryDate.getMonth() + monthsToAdd);

        // Format: dd/MM/yyyy
        var dd = String(expiryDate.getDate()).padStart(2, '0');

    function _____controlid______CallSaveApi(row) {

        return new Promise(function (resolve, reject) {
            if (!_____controlid______choseKH) {
                _____controlid______AlertMessage.showInfo("KHACHHANG_NO_EXIS");
                _____controlid______Loading.hide();
                resolve(-1);
                return;
            }
            if (!_____controlid______choseCS) {
                _____controlid______AlertMessage.showInfo("COSOCUAHANGHANG_NO_EXIS");
                _____controlid______Loading.hide();
                resolve(-1);
                return;
            }
            $.ajax
                ({
                    type: 'POST',
                    url: 'api/Voucher/Save',    
                    //async: false,
                    data: JSON.stringify(row),
                    contentType: 'application/json; charset=utf-8',
                    success: function (data) {
                        if (data.Code == 1) {
                            ShowNotification('Thành công!', 'success');
                            if (!isNullOrEmpty(_____controlid______DataSourceOther)) {
                                var index = _____controlid______DataSourceOther.Vouchers.findIndex(x => x.Serial == row.Serial);
                                if (index > -1) {
                                    _____controlid______DataSourceOther.Vouchers[index].NumberOfUseRemaining = row.NumberOfUseRemaining;
                                    _____controlid______DataSourceOther.Vouchers[index].NumberOfFreeRemaining = row.NumberOfFreeRemaining;
                                    _____controlid______DataSourceOther.Vouchers[index].UpdateAt = data.ModifiedAt;
                                    _____parentid______S3Table.Update(_____controlid______DataSourceOther);
                                }
                            } else {
                                if (eval("typeof _____parentid______S3Table") != 'undefined') {
                                    row.Id = data.Id;
                                    row.UpdateAt = data.ModifiedAt;
                                    _____parentid______S3Table.Update(row);
                                }
                            }
                            _____controlid______Loading.hide();
                            resolve(0);
                            
                        } else {
                            _____controlid______Loading.hide();
                            handleResponseApiCode(_____controlid______AlertMessage, data);
                            resolve(-1);
                        }
                    },

                    error: function (result) {
                        _____controlid______Loading.hide();
                        handleResponseError(_____controlid______AlertMessage, result);
                        resolve(-1);
                    }
                });
          
        });
    }
