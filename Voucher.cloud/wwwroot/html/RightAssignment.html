    function _____controlid_______right1_click(element, id) {
        let index = _____controlid_______S3Table.ClusterizeData.data.findIndex(function (o) {
            return o.Id === id;
        })

        _____controlid_______S3Table.ClusterizeData.data[index].Right_1 = element.checked;
        let row = _____controlid_______S3Table.ClusterizeData.data[index];
        _____controlid_______S3Table.ClusterizeData.RowStateModified(row.Id);
        let model = new Object();
        model.row = row;
        model.controlid = "_____controlid_____";
        _____controlid_______S3Table.ClusterizeData.row_data.splice(index, 1, RightAssignment_BuildRow(model));
        
        if (_____controlid_______S3Table.ClusterizeData.data[index].ParentId == '') {
            let parentId = _____controlid_______S3Table.ClusterizeData.data[index].Id;
            _____controlid_______S3Table.ClusterizeData.data.filter(arow => arow.ParentId == parentId).forEach(function (arow) {
                let index = _____controlid_______S3Table.ClusterizeData.data.findIndex(function (o) {
                    return o.Id === arow.Id;
                });
                _____controlid_______S3Table.ClusterizeData.data[index].Right_1 = element.checked;
                _____controlid_______S3Table.ClusterizeData.RowStateModified(arow.Id);
                let amodel = new Object();
                amodel.row = arow;
                amodel.controlid = "_____controlid_____";
                _____controlid_______S3Table.ClusterizeData.row_data.splice(index, 1, RightAssignment_BuildRow(amodel));
            });
        }

        _____controlid_______S3Table.Clusterize.update(_____controlid_______S3Table.ClusterizeData.row_data);
    }

    async function _____controlid______OnShow() {
        var key = !"_____controlid_____".includes("_Role") ? "UserRightAssignment_Title" : "GroupRightAssignment_Title";
        await translator.translateWithKey($('#desk______controlid_____ .form-title .billingual-wrapper')[0], key);
        await translator.translateWithKey($('#tab______controlid_____ .billingual-wrapper')[0], key);
        let BuildRowModel = new Object();
        BuildRowModel.controlid = "_____controlid_____";
        _____controlid_______S3Table.SetOptions({
            BuildRow: RightAssignment_BuildRow,
            BuildRowModel: BuildRowModel,
            Callbacks: {
                ClusterChanged: function () {
                    /*_____controlid______TreeTableToggle();*/
                }
            }
        });
        _____controlid_______S3Table.Init();

        _____controlid______Loading = new ItpOverlay("container______controlid_____", "partial-loading");
        _____controlid______Loading.show();
        window.setTimeout(function () {
            let url = 'api/RightAssignment/Get?' + (!"_____controlid_____".includes("_Role") ? 'userId=' : 'roleId=') + _____parentid______S3Table.ClusterizeData.current_row_id;
            $.ajax({
                type: 'GET',
                url: url,
                //async: false,
                contentType: 'application/json; charset=utf-8',
                success: function (data) {                    
                    _____controlid_______S3Table.Load(data);
                },

                error: function (result) {
                    _____controlid______Loading.hide();
                    handleResponseError(_____controlid______AlertMessage, result);
                },
                complete: function () {
                    _____controlid______Loading.hide();
                },
            });
        }, 0);
    }

    async function _____controlid______OnSave() {
        var data = [];

        $.map(_____controlid_______S3Table.ClusterizeData.data, function (value, index) {
            var temp = new Object();
            temp.UserId = _____parentid______S3Table.ClusterizeData.current_row_id;
            temp.FuncID = value.Id;
            temp.FuncType = "I";
            temp.Right_1 = value.Right_1;
            temp.Right_2 = value.Right_2;
            temp.Right_3 = value.Right_3;
            temp.Right_4 = value.Right_4;
            temp.Right_5 = value.Right_5;
            temp.IsUser = !"_____controlid_____".includes("_Role");
            temp.RowState = value.RowState;
            data.push(temp);
        });

        return _____controlid______callSaveApi(data);
    }

    function _____controlid______callSaveApi(data) {
        return new Promise(function (resolve, reject) {
            $.ajax
            ({
                type: 'POST',
                url: 'api/RightAssignment/Save',
                //async: false,
                data: JSON.stringify(data),
                contentType: 'application/json; charset=utf-8',
                success: function (data) {
                    let obj = data;

                    if (obj.Code == 1) {
                        ShowNotification('Thành công!', 'success');
                        _____controlid______Loading.hide();
                        resolve(0);
                    } else {
                        _____controlid______Loading.hide();
                        handleResponseApiCode(_____controlid______AlertMessage, obj);
                        resolve(-1);
                    }
                },

                error: function (result) {
                    _____controlid______Loading.hide();
                    handleResponseError(_____controlid______AlertMessage, result);
                    resolve(-1);
                }
            });
        });
    }
