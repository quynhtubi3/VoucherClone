<script>

    var T00_LUONGTHANG_S3Table = null;

    T00_LUONGTHANG_S3Table = new S3ttable({
        Id: "T00_LUONGTHANG_ScrollArea",
        ClusterizeData: ClusterizeData(),
        BuildRow: function (model) {
            let row = model.row;

            let deleteIcon = "<div class='s3t-tooltip' data-tooltip-key='Common_Button_Delete'><i onclick='" + "_____controlid______deleteLuongTheoThang(\"" + row.Id + "\",\"" + row.Thang + "\",\"" + row.Nam + "\",\"" + row.SoLanTrongThang + "\");' class='fa fa-trash-o'></i></div>";
            let exportDanhSachChuyenKhoanIcon = "<div class='s3t-tooltip' data-tooltip-key='QTLUONG_Var_Button_DanhSachChuyenKhoan'><i onclick='" + "_____controlid______exportDanhSachChuyenKhoan(\"" + row.Name + "\",\"" + row.Id + "\",\"" + row.Thang + "\",\"" + row.Nam + "\",\"" + row.SoLanTrongThang + "\");' class='fa fa-list'></i></div>";
            let exportLuongThangKCTIcon = "<div class='s3t-tooltip' data-tooltip-key='QTLUONG_Var_Button_LuongThangKTC'><i onclick='" + "_____controlid______exportLuongThangKCT(\"" + row.Name + "\",\"" + row.Id + "\",\"" + row.Thang + "\",\"" + row.Nam + "\",\"" + row.SoLanTrongThang + "\");' class='fa fa-download'></i></div>";
            let exportLuongThangIcon = "<div class='s3t-tooltip' data-tooltip-key='QTLUONG_Var_Button_LuongThang'><i onclick='" + "_____controlid______exportLuongThang(\"" + row.Name + "\",\"" + row.Id + "\",\"" + row.Thang + "\",\"" + row.Nam + "\",\"" + row.SoLanTrongThang + "\");' class='fa fa-calendar'></i></div>";

            let tr = "<tr>" +
                "<th clusterize_row_id='" + row.Id + row.Thang + row.Nam + row.SoLanTrongThang + "'>" + "</th>" +
                "<td class='no-format upper-case'>" + row.Code + "</td>";
            tr += "<td class='no-format upper-case'>" + row.GhiChuHeThong + "</td>";
            tr += "<td class='no-format center'><div style='display: flex; flex-direction: row;justify-content: space-evenly;align-items: center;'>" + exportLuongThangKCTIcon + '    ' + exportLuongThangIcon + '    ' + exportDanhSachChuyenKhoanIcon + '    ' + deleteIcon + "</div></td>";

            return translateRow(tr);
        },
        Callbacks: {
            ClusterChanged: function () {
                buildToolTip($('#desk______controlid_____ .s3t-tooltip'));
                if (T00_LUONGTHANG_S3Table.ClusterizeData.data.length > 0)
                    $("#desk_T00 .s3tcloud-prefix.QTLuongThang .clusterize-scroll").css('max-height', $('#desk_T00 .s3tcloud-prefix.QTLuongThang').height() - $('#desk_T00 .s3tcloud-prefix.QTLuongThang .Title').height() - 80);
            }
        }
    });

    $(function () {

        $("#desk______controlid_____ .popup-modal-background>div[child-form='search'] .button-save").on('click', function () {
            $('#desk______controlid_____ .form-container:first').focus();
            $('#desk______controlid_____ .popup-modal-background').hide();
            _____controlid______OnLoad();
        });

        $("#desk______controlid_____ .popup-modal-background>div[child-form='importdata'] .button-save").on('click', function () {
            $('#desk______controlid_____ .form-container:first').focus();
            $('#desk______controlid_____ .popup-modal-background').hide();
            if (!$(this).closest('.popup-modal-form').find('.text-search').value()) {
                _____controlid______AlertMessage.showInfo('Common_Msg_NoFileToImport');
                return;
            }
            _____controlid______UploadFile('#_____controlid______luong_file1', false);

    async function _____controlid______UploadFile(selector, isThang) {

        let model = new Object();
        let l = $(selector)[0].files;
        if (l.length > 0) {
            let lFile = l[0];
            let customFile = await getFile(lFile);

            model.CoQuanID = $(selector + '_input').data('data-value') ? JSON.parse($(selector + '_input').data('data-value')).Id : '';
            model.Code = $(selector + '_input').data('data-value') ? JSON.parse($(selector + '_input').data('data-value')).Code : '';
            model.LuongFileName = $(selector + '_input').data('data-value') ? JSON.parse($(selector + '_input').data('data-value')).Name : '';
            model.LuongFile = customFile.base64StringFile;
            model.LuongFileExtension = lFile.type.split("/").pop();
        }

        if (isThang) {
            model.Thang = $(".modal-textbox.text-select.Thang").value();
            //model.Thang = $('#desk______controlid_____ .popup-modal-background .Thang').value();
            model.Nam = $(".modal-textbox.text-select.Nam").value();
            //model.Nam = $('#desk______controlid_____ .popup-modal-background .Nam').value();
            model.Lan = $(".modal-textbox.text-select.Lan").value();
            //model.Lan = $('#desk______controlid_____ .popup-modal-background .Lan').value();
        }
        model.IsThang = isThang;
        _____controlid______Loading.show();
        return new Promise(function (resolve, reject) {
            $.ajax
                ({
                    type: 'POST',
                    url: 'api/' + _____controlid______Table + '/Upload',
                    //async: false,
                    data: JSON.stringify(model),
                    contentType: 'application/json; charset=utf-8',
                    success: function (dataout) {
                        if (dataout.Code == 1) {
                            _____controlid______Modal_Close();
                            _____controlid______OnLoad();
                            setTimeout(function () {
                                (async () => {
                                    await _____controlid______OnFilter();
                                    _____controlid______Loading.hide();
                                    _____controlid______AlertMessage.showInfo('Common_Msg_ProcessDone');
                                })();
                            }, 0);
                        } else if (dataout.Code == 2) { //Không cập nhật được dòng nào
                            _____controlid______Loading.hide();
                        } else { //Có lỗi xảy ra
                            _____controlid______Loading.hide();
                            handleResponseApiCode(_____controlid______AlertMessage, dataout);
                        }
                    },

                    error: function (result) {
                        _____controlid______Loading.hide();
                        handleResponseError(_____controlid______AlertMessage, result);
                    }
                });
        });
    }
