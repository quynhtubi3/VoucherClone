<script>
    let _____controlid______currentPage = 1;
    let _____controlid______pageSize = 10;
    let _____controlid______totalPage = 1;
    $(function () {
        $('#desk______controlid_____ .s3tcloud-prefix.form-container:first').on('keyup', function (e) {
            switch (e.keyCode) {
                case 33: //PageUp
                    e.preventDefault();
                    _____controlid______GetPermision();
                    break;
                case 34: //PageDown
                    e.preventDefault();
                    _____controlid______GetPermision();
                    break;
                case 38: //Up
                    _____controlid______GetPermision();
                    break;
                case 40: //Down
                    _____controlid______GetPermision();
                    break;
            }
        });
        $('#desk______controlid_____ .popup-modal-background>div[child-form="search2"] .button-save').on('click', function () {
            $('#desk______controlid_____ .form-container:first').focus();
            $('#desk______controlid_____ .popup-modal-background').hide();
            _____controlid______OnLoad();
        })

        $('#desk______controlid_____ .popup-modal-background').on('keydown', function (e) {
            if (e.ctrlKey && e.keyCode == 13 && _____controlid______Modal == 'search') {
                e.preventDefault();
                $('#desk______controlid_____ .form-container:first').focus();
                $('#desk______controlid_____ .popup-modal-background').hide();
                _____controlid______OnLoad();
            }
        })

        $('#_____controlid______pageSizeSelect').on('change', function () {
            _____controlid______pageSize = parseInt($(this).val());
            _____controlid______currentPage = 1;
            _____controlid______OnLoad();
        });
        _____controlid______renderPagination();
        $('#desk______controlid_____ .form-toolbar .button-refresh').on('click', function (e) {
            _____controlid______OnLoad();
        });
    })

    function _____controlid______renderPagination() {
        const pagination = document.getElementById("_____controlid______pagination");
        pagination.innerHTML = "";
        pagination.innerHTML += `<li><button onclick="_____controlid______goToPage(1)" ${_____controlid______currentPage === 1 ? "disabled" : ""}>«</button></li>`;
        pagination.innerHTML += `<li><button onclick="_____controlid______goToPage(${_____controlid______currentPage - 1})" ${_____controlid______currentPage === 1 ? "disabled" : ""}>‹</button></li>`;
        let start = Math.max(1, _____controlid______currentPage - 2);
        let end = Math.min(_____controlid______totalPage, _____controlid______currentPage + 2);
        for (let i = start; i <= end; i++) {
            pagination.innerHTML += `<li><button onclick="_____controlid______goToPage(${i})" class="${i === _____controlid______currentPage ? "active" : ""}">${i}</button></li>`;
        }
        pagination.innerHTML += `<li><button onclick="_____controlid______goToPage(${_____controlid______currentPage + 1})" ${_____controlid______currentPage === _____controlid______totalPage ? "disabled" : ""}>›</button></li>`;
        pagination.innerHTML += `<li><button onclick="_____controlid______goToPage(${_____controlid______totalPage})" ${_____controlid______currentPage === _____controlid______totalPage ? "disabled" : ""}>»</button></li>`;
    }
    function _____controlid______goToPage(page) {
        if (page < 1 || page > _____controlid______totalPage) return;
        _____controlid______currentPage = page;
        _____controlid______renderPagination();
        _____controlid______OnLoad();
    }

    function _____controlid______Search() {
        _____controlid______Modal = 'search';
        if (eval("typeof _____controlid______SearchPreprocess") == "function") _____controlid______SearchPreprocess();
        $("#desk______controlid_____ .popup-modal-background>div[child-form='search2']").show();
        $("#desk______controlid_____ .popup-modal-background>div[child-form!='search2']").hide();

        ShowModalCenterOfParent("desk______controlid_____", "desk______controlid_____ .s3tcloud-prefix.form-container", "modal______controlid_____ .popup-modal-background>div[child-form='search2'] .popup-modal-form");

        $('#desk______controlid_____ .popup-modal-background').show();
        $('#desk______controlid_____ .popup-modal-background .popup-modal-body input:visible:first').focus();
    }



    function _____controlid______GetPermision() {
        if (_____controlid______S3Table.ClusterizeData.CurrentRowData() == null || _____controlid______S3Table.ClusterizeData.CurrentRowData().Id == ApplicationInstance.UserId) {
            _____controlid______Right1 = true;
            _____controlid______Right2 = false;
            _____controlid______Right3 = false;
        } else {
            if (_____controlid______S3Table.ClusterizeData.CurrentRowData().LockoutEnd != null) {
                _____controlid______Right1 = true;
                _____controlid______Right2 = false;
                _____controlid______Right3 = false;
            } else {
                if (_____controlid______S3Table.ClusterizeData.CurrentRowData().EmailConfirmed == true) {
                    _____controlid______Right1 = true;
                    _____controlid______Right2 = false;
                    _____controlid______Right3 = true;
                } else {
                    _____controlid______Right1 = true;
                    _____controlid______Right2 = true;
                    _____controlid______Right3 = true;
                }
            }
        }
    }
    _____controlid______Type = "BaoCaoThongKe";
    function _____controlid______ReplaceTile(model) {
        let $title = $('#desk______controlid_____ .form-title .billingual-wrapper').first();
        let originalText = $title.text();
        let isValidDate = (dateStr) => {
            if (!dateStr || typeof dateStr !== "string") return false;
            let parts = dateStr.split('/');
            if (parts.length !== 3) return false;

            let day = parseInt(parts[0], 10);
            let month = parseInt(parts[1], 10) - 1;
            let year = parseInt(parts[2], 10);

            let d = new Date(year, month, day);
            return d.getFullYear() === year && d.getMonth() === month && d.getDate() === day;
        };

        let fromStr = isValidDate(model.fromDate) ? model.fromDate : '';
        let toStr = isValidDate(model.toDate) ? model.toDate : '';
        let extra = (fromStr || toStr) ? ` ${fromStr} - ${toStr}` : '';

        $title.text(originalText + extra);

    }
    async function _____controlid______OnLoad() {
        _____controlid______S3Table.SetOptions({
            HasImage: true,
            SortCondition: sort_by({ name: 'FullName', reverse: false }),
            DetailCallback: _____controlid______GetPermision
        })
        let model = new Object();
        let $search = $('#desk______controlid_____ .popup-modal-background [child-form="search2"]');
        model.toDate = $search.find('.toDate').val();
        model.fromDate = $search.find('.fromDate').val(); 
        model.PageNumber = _____controlid______currentPage;
        model.PageSize = _____controlid______pageSize;
        await translator.translateWithKey($('#tab______controlid_____ .billingual-wrapper')[0], "DoanhthunTheoLoaiVoucher_Var_Title");
        await translator.translateWithKey($('#desk______controlid_____ .form-title .billingual-wrapper')[0], "DoanhthunTheoLoaiVoucher_Var_Title");
        _____controlid______ReplaceTile(model);
        // Sau khi dịch xong mới lấy text và gán lại
        _____controlid______Loading.show();

        window.setTimeout(function () {
           
            $.ajax({
                type: 'POST',
                url: 'api/BaoCaoThongKe/GetDoanhThuTheoLoaiVoucher',
                //async: false,
                data: JSON.stringify(model),
                contentType: 'application/json; charset=utf-8',
                success: function (data) {
                    _____controlid______S3Table.Load(data.Data);
                    _____controlid______Loading.hide();
                    _____controlid______totalPage = Math.ceil(data.TotalCount / _____controlid______pageSize);
                    _____controlid______renderPagination();
                },

                error: function (result) {
                    _____controlid______Loading.hide();
                    handleResponseError(_____controlid______AlertMessage, result, "_____controlid_____");
                }
            });

        }, 0);
    }

</script>
